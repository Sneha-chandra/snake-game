<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake — Sneha Chandra</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --bg2: #161b22; --border: #30363d;
    --green: #3fb950; --red: #f85149; --accent: #58a6ff;
    --text: #e6edf3; --muted: #8b949e;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", monospace;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; gap: 16px;
    user-select: none;
  }
  h1 { font-size: 28px; letter-spacing: 2px; color: var(--green); }
  .subtitle { color: var(--muted); font-size: 13px; }

  .scoreboard {
    display: flex; gap: 32px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 28px;
  }
  .score-box { text-align: center; }
  .score-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .score-val { font-size: 26px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }

  canvas {
    border: 2px solid var(--border); border-radius: 10px;
    background: var(--bg2); display: block;
    box-shadow: 0 0 40px rgba(63,185,80,0.08);
  }

  .controls { color: var(--muted); font-size: 12px; text-align: center; line-height: 1.8; }
  .controls kbd {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 4px; padding: 2px 7px; font-size: 11px; color: var(--text);
  }

  #overlay {
    position: absolute; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    background: rgba(13,17,23,0.92); border-radius: 10px;
    padding: 32px 48px;
  }
  #overlay h2 { font-size: 22px; }
  #overlay .final { font-size: 14px; color: var(--muted); }
  #overlay button {
    background: var(--green); border: none; border-radius: 6px;
    color: #000; font-size: 15px; font-weight: 700;
    padding: 10px 32px; cursor: pointer; letter-spacing: 1px;
    transition: opacity .2s;
  }
  #overlay button:hover { opacity: .85; }
  .canvas-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
  .hidden { display: none !important; }

  .level-badge {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 16px; font-size: 12px; color: var(--muted);
    display: flex; gap: 12px;
  }
  .level-badge span { cursor: pointer; padding: 2px 8px; border-radius: 10px; transition: .2s; }
  .level-badge span.active { background: var(--accent); color: #000; font-weight: 700; }
</style>
</head>
<body>

<h1>🐍 SNAKE</h1>
<p class="subtitle">by Sneha Chandra</p>

<div class="scoreboard">
  <div class="score-box">
    <div class="score-label">Score</div>
    <div class="score-val" id="score">0</div>
  </div>
  <div class="score-box">
    <div class="score-label">Best</div>
    <div class="score-val" id="best">0</div>
  </div>
  <div class="score-box">
    <div class="score-label">Level</div>
    <div class="score-val" id="lvl">1</div>
  </div>
</div>

<div class="level-badge">
  <span id="btn-easy" class="active" onclick="setSpeed('easy')">Easy</span>
  <span id="btn-medium" onclick="setSpeed('medium')">Medium</span>
  <span id="btn-hard" onclick="setSpeed('hard')">Hard</span>
</div>

<div class="canvas-wrap">
  <canvas id="c" width="420" height="420"></canvas>
  <div id="overlay">
    <h2 id="overlay-title">🐍 SNAKE</h2>
    <div class="final" id="overlay-msg">Use arrow keys or WASD to move</div>
    <button onclick="startGame()">▶ Start Game</button>
  </div>
</div>

<div class="controls">
  <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> &nbsp;or&nbsp;
  <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> &nbsp;to move &nbsp;|&nbsp;
  <kbd>P</kbd> pause
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const CELL = 20;
const COLS = canvas.width  / CELL;   // 21
const ROWS = canvas.height / CELL;   // 21

const SPEEDS = { easy: 130, medium: 80, hard: 45 };
let speed = SPEEDS.easy;

let snake, dir, nextDir, food, score, gameLoop, paused, running;

const COLORS = {
  head:    '#3fb950',
  body:    '#2ea043',
  bodyDim: '#196127',
  food:    '#f85149',
  foodGlow:'rgba(248,81,73,0.25)',
  grid:    '#21262d',
  bg:      '#161b22',
};

function setSpeed(level) {
  speed = SPEEDS[level];
  document.querySelectorAll('.level-badge span').forEach(s => s.classList.remove('active'));
  document.getElementById('btn-' + level).classList.add('active');
  if (running && !paused) { clearInterval(gameLoop); gameLoop = setInterval(tick, speed); }
}

function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
  dir = { x: 1, y: 0 }; nextDir = { x: 1, y: 0 };
  score = 0; paused = false; running = true;
  updateScore();
  placeFood();
  clearInterval(gameLoop);
  gameLoop = setInterval(tick, speed);
}

function tick() {
  if (paused) return;
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall wrap
  head.x = (head.x + COLS) % COLS;
  head.y = (head.y + ROWS) % ROWS;

  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) { endGame(); return; }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10 + Math.floor(score / 50);
    updateScore();
    placeFood();
  } else {
    snake.pop();
  }

  draw();
}

function placeFood() {
  let pos;
  do { pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) }; }
  while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function draw() {
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid dots
  ctx.fillStyle = COLORS.grid;
  for (let x = 0; x < COLS; x++)
    for (let y = 0; y < ROWS; y++) {
      ctx.beginPath(); ctx.arc(x * CELL + CELL/2, y * CELL + CELL/2, 1, 0, Math.PI*2);
      ctx.fill();
    }

  // Food glow
  ctx.beginPath();
  const fx = food.x * CELL + CELL/2, fy = food.y * CELL + CELL/2;
  const grd = ctx.createRadialGradient(fx, fy, 2, fx, fy, CELL);
  grd.addColorStop(0, COLORS.foodGlow); grd.addColorStop(1, 'transparent');
  ctx.arc(fx, fy, CELL, 0, Math.PI*2); ctx.fillStyle = grd; ctx.fill();

  // Food
  ctx.fillStyle = COLORS.food;
  roundRect(ctx, food.x * CELL + 3, food.y * CELL + 3, CELL - 6, CELL - 6, 4);
  ctx.fill();

  // Snake
  snake.forEach((seg, i) => {
    ctx.fillStyle = i === 0 ? COLORS.head : (i % 2 === 0 ? COLORS.body : COLORS.bodyDim);
    roundRect(ctx, seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2, i === 0 ? 6 : 4);
    ctx.fill();
  });

  // Eyes on head
  const hx = snake[0].x * CELL, hy = snake[0].y * CELL;
  ctx.fillStyle = '#000';
  const eyeOff = { x: dir.y !== 0 ? [-4,4] : [3,3], y: dir.x !== 0 ? [-4,4] : [3,3] };
  [[hx + CELL/2 + (dir.y !== 0 ? -4 : dir.x*3), hy + CELL/2 + (dir.x !== 0 ? -4 : dir.y*3)],
   [hx + CELL/2 + (dir.y !== 0 ?  4 : dir.x*3), hy + CELL/2 + (dir.x !== 0 ?  4 : dir.y*3)]
  ].forEach(([ex, ey]) => {
    ctx.beginPath(); ctx.arc(ex, ey, 2, 0, Math.PI*2); ctx.fill();
  });

  // Level indicator
  document.getElementById('lvl').textContent = Math.floor(score / 50) + 1;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.arcTo(x+w,y, x+w,y+r, r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x+w,y+h, x+w-r,y+h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x,y+h, x,y+h-r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x,y, x+r,y, r);
  ctx.closePath();
}

function updateScore() {
  document.getElementById('score').textContent = score;
  const best = Math.max(score, parseInt(localStorage.getItem('snake-best') || 0));
  localStorage.setItem('snake-best', best);
  document.getElementById('best').textContent = best;
}

function endGame() {
  clearInterval(gameLoop); running = false;
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');
  document.getElementById('overlay-title').textContent = '💀 Game Over';
  document.getElementById('overlay-msg').textContent = `Score: ${score}`;
  overlay.querySelector('button').textContent = '↺ Play Again';
}

document.addEventListener('keydown', e => {
  const map = {
    ArrowUp: {x:0,y:-1}, ArrowDown: {x:0,y:1}, ArrowLeft: {x:-1,y:0}, ArrowRight: {x:1,y:0},
    w: {x:0,y:-1}, s: {x:0,y:1}, a: {x:-1,y:0}, d: {x:1,y:0},
    W: {x:0,y:-1}, S: {x:0,y:1}, A: {x:-1,y:0}, D: {x:1,y:0},
  };
  if (map[e.key]) {
    const nd = map[e.key];
    if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
    e.preventDefault();
  }
  if (e.key === 'p' || e.key === 'P') { paused = !paused; }
});

// Mobile swipe
let tx = 0, ty = 0;
canvas.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive:true});
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy)) nextDir = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
  else nextDir = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
}, {passive:true});

document.getElementById('best').textContent = localStorage.getItem('snake-best') || 0;
</script>
</body>
</html>
